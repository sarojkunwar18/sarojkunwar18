<!DOCTYPE html>
<html>
<head>
    <title>Saroj Kunwar - Profile</title>
    <style>
        /* Website ko background ani font style */
        body {
            background: linear-gradient(135deg, #74ebd5, #acb6e5); /* Dual color background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Profile card ko design */
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 300px;
        }

        /* PP lai golo banaune style */
        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%; /* Yesle photo lai golo banauchha */
            border: 5px solid #acb6e5;
            object-fit: cover; /* Photo nanigari fit hunchha */
        }

        h1 { color: #333; margin-top: 15px; }
        p { color: #666; font-size: 18px; }
    </style>
</head>
<body>

    <div class="card">
        <img src="mero-photo.jpg" alt="Saroj Kunwar" class="profile-pic">
        
        <h1>Saroj Kunwar</h1>
        <p>Namaste! Yo mero mobile bata banayeko naya design ho.</p>
    </div>

</body>
</html>
